services:
  db:
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/docker/20-init-test-db.sh:/docker-entrypoint-initdb.d/20-init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fastapi-pgvector-rag:local
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV_DOCKER}
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL}
    ports:
      - "8000:8000"
    command: ["uv", "run", "--no-dev", "python", "-m", "uvicorn", "rag_api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    image: fastapi-pgvector-rag:local
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV_DOCKER}
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL}
    command: ["uv", "run", "--no-dev", "python", "-m", "rag_api.worker"]

volumes:
  pgdata:
  ollama_data:
